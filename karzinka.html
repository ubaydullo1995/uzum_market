<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Link FonteAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Link Css -->
    <link rel="stylesheet" href="style.css" />
    <title>uzumMarket</title>
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="header_container max-width display">
        <div class="header_logo display">
          <img src="./assste/logotipUzum.png" />
          <h1>uzum market</h1>
        </div>
        <div class="display">
          <button class="header_btn">Katalog</button>
          <div class="header_input">
            <input type="text" placeholder="Mahsulotlar va turkumlar izlash" />
            <button class="header_search_icen">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
        </div>
        <nav>
          <ul class="display">
            <a href="./index.html" class="display header_ul">
              <i class="fa-regular fa-user"></i>
              <li>Kirish</li>
            </a>
            <a class="display header_ul">
              <i class="fa-regular fa-heart"></i>
              <li>Saralangan</li>
            </a>
            <a class="display header_ul">
              <i class="fa-solid fa-basket-shopping"></i>
              <li>Savat <span id="cartCount">0</span></li>
            </a>
          </ul>
        </nav>
      </div>
    </header>

    <div class="sociols max-width">
      <div class="sociol">
        <img src="./assste/olovcha.png" />
        <p>Hafta tovarlari</p>
      </div>
      <div class="sociol">
        <img src="./assste/fudbolka.png" />
        <p>Bahorgi kolleksiya</p>
      </div>
      <div class="sociol">
        <img src="./assste/mazi.png" />
        <p>Sizning go'zalligingiz</p>
      </div>
      <div class="sociol">
        <img src="./assste/gitari.png" />
        <p>Xobbi va ijod</p>
      </div>
      <div class="sociol">
        <img src="./assste/oyfon.png" />
        <p>Smartfonlar</p>
      </div>
      <div class="sociol">
        <img src="./assste/sveti.png" />
        <p>Bahor yarmarkasi</p>
      </div>
      <div class="sociol_nav">
        <ul class="display">
          <li>Mebel</li>
          <li>Turizim, baliq ovi va ovchilik</li>
          <li>Yana <i class="fa-solid fa-angle-down"></i></li>
        </ul>
      </div>
    </div>

    <div class="subSociol max-width">
      <button>
        <img src="./assste/ayiq.png" />
        Onalar va bolalar uchun
      </button>
      <button>
        <img src="./assste/ptlichka.png" />
        Arzon narxlar kafolati
      </button>
      <button>
        <img src="./assste/jenfir.png" />
        Zamonaviy bozor
      </button>
      <button>
        <img src="./assste/sveti.png" />
        Bahor yarmarkasi
      </button>
    </div>

    <div class="max-width">
      <h2 class="savatcha">🛒 Savat</h2>

      <div class="display">
        <div id="cartItems"></div>
        <h3 id="totalPrice">Jami: 0 so'm</h3>
      </div>
    </div>

    <script src="./cart.js"></script>
  </body>
</html>
